steps:
  - label: ":white_check_mark: Job 1 — always passes"
    command:
      - echo "Job 1 running..."
      - echo "OK"

  - label: ":arrows_counterclockwise: Job 2 — fails once, passes on retry"
    key: flaky_once
    command: |
      set -eu

      echo "Env retry count (for debugging): ${BUILDKITE_RETRY_COUNT:-}"
      echo "Script path (for debugging): ${BUILDKITE_SCRIPT_PATH:-}"

      # This value persists for the build across job retries (UI or API),
      # and does not depend on the agent filesystem.
      FAILED_ONCE="$(buildkite-agent meta-data get flaky_once_failed 2>/dev/null || true)"
      echo "Meta-data flaky_once_failed: ${FAILED_ONCE:-<unset>}"

      if [ "$FAILED_ONCE" = "true" ]; then
        echo "Already failed once -> passing now."
        exit 0
      fi

      echo "First attempt -> setting meta-data and failing on purpose."
      buildkite-agent meta-data set flaky_once_failed true
      exit 1
    retry:
      manual:
        permit_on_passed: false
      automatic: false

  - label: ":white_check_mark: Job 3 — runs after flaky job succeeds"
    depends_on: flaky_once
    command:
      - echo "Job 3 running..."
      - echo "OK"
