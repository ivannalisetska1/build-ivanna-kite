steps:
  - key: approval-comment
    command: |
      API_TOKEN=$(buildkite-agent secret get API_TOKEN)
      GITHUB_TOKEN=$(buildkite-agent secret get GITHUB_TOKEN)
      export API_TOKEN GITHUB_TOKEN

      echo "API_TOKEN length: $${#API_TOKEN}"
      echo "GITHUB_TOKEN length: $${#GITHUB_TOKEN}"

      BLOCK_JOB_ID=$(curl -s -H "Authorization: Bearer $$API_TOKEN" \
        "https://api.buildkite.com/v2/organizations/$$BUILDKITE_ORGANIZATION_SLUG/pipelines/$$BUILDKITE_PIPELINE_SLUG/builds/$$BUILDKITE_BUILD_NUMBER" \
        | jq -r '.jobs[] | select(.type=="manual" and .step_key=="approve-deploy") | .id')
      export APPROVE_URL="$$BUILDKITE_BUILD_URL#$$BLOCK_JOB_ID"
    plugins:
      - pr-commenter#v0.3.0:
          message: "👉 [Approve the deploy here]($$APPROVE_URL)"
          secret-name: GITHUB_TOKEN
          allow-repeats: false

  - key: approve-deploy
    block: "Approve deploy"
    depends_on: approval-comment

  - command: echo "You are getting the expected behaviour"
    depends_on: approve-deploy
