steps:
  - label: ":white_check_mark: Job 1 — always passes"
    command:
      - echo "Job 1 running..."
      - echo "OK"

  - label: ":arrows_counterclockwise: Job 2 — fails once, passes on retry"
    key: flaky_once
    command: |
      echo "Retry count is: $BUILDKITE_RETRY_COUNT"

      if [ -z "$BUILDKITE_RETRY_COUNT" ] || [ "$BUILDKITE_RETRY_COUNT" -eq 0 ]; then
        echo "Failing on first attempt on purpose."
        exit 1
      fi

      echo "This is a retry; passing now."
    retry:
      manual:
        permit_on_passed: false
      automatic: false

  - label: ":white_check_mark: Job 3 — runs after flaky job succeeds"
    depends_on: flaky_once
    command:
      - echo "Job 3 running..."
      - echo "OK"
