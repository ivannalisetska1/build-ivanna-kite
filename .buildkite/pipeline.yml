steps:
- group: Blocking Tests
  key: blocking
  steps:
  - label: test-1
    command: exit 0
    priority: 10
    timeout_in_minutes: 30
    notify:
    - github_commit_status:
        context: buildkite/test-1
      if: step.state == 'waiting_for_dependencies' || step.state == 'running' || step.state
        == 'finished'
    - github_commit_status:
        context: buildkite/required-context
      if: step.outcome == 'hard_failed'
  notify:
  - github_commit_status:
      context: buildkite/required-context
    if: (step.state == 'finished' || step.state == 'running') && step.outcome != 'hard_failed'
      && step.outcome != 'soft_failed'
- group: Non-Blocking Tests
  key: non-blocking
  steps:
  - label: test-2
    command: exit 1
    timeout_in_minutes: 30
    notify:
    - github_commit_status:
        context: buildkite/test-2
      if: step.state == 'waiting_for_dependencies' || step.state == 'running' || step.state
        == 'finished'

        
